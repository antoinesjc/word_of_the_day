<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word of the Day — Mandarin Zest</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --orange:#f37a48;--orange-dark:#d95f2c;--orange-light:#f8dacd;
    --green:#228b22;--green-dark:#1a6b1a;--green-light:#e0f4e0;
    --white:#ffffff;--ink:#1c1c1c;--ink-mid:#555555;--ink-light:#999999;
    --surface:#fdfcfa;--border:#ecddd5;
  }

  body {
    font-family:'Outfit',sans-serif;
    background:transparent;
    margin:0;
    padding:0;
  }

  .widget {
    width:100%;
    max-width:380px;
    background:var(--white);
    border:1px solid var(--border);
    border-radius:20px;
    overflow:hidden;
    position:relative;
  }

  /* Top gradient bar */
  .widget::before {
    content:'';
    position:absolute;
    top:0;left:0;right:0;
    height:4px;
    background:linear-gradient(90deg,var(--orange),var(--green));
  }

  /* Header */
  .header {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0.875rem 1.25rem;
    border-bottom:1px solid var(--border);
  }
  .wotd-header-label {
    font-size:11px;font-weight:600;letter-spacing:0.12em;
    text-transform:uppercase;color:var(--orange);
  }

  .date-badge {
    font-size:11px;font-weight:500;
    color:var(--ink-light);
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:20px;
    padding:3px 10px;
  }

  /* Body */
  .body {
    padding:1.5rem 1.25rem 1.25rem;
    text-align:center;
  }

  .wotd-label {
    font-size:10px;font-weight:600;letter-spacing:0.12em;
    text-transform:uppercase;color:var(--orange);
    margin-bottom:1rem;
  }

  /* Character */
  .char-wrap {
    position:relative;
    display:inline-block;
    margin-bottom:1rem;
  }
  .char-bg {
    font-family:'Noto Serif SC',serif;
    font-size:100px;
    font-weight:700;
    line-height:1;
    color:var(--ink);
    opacity:0.06;
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-54%);
    pointer-events:none;
    user-select:none;
  }
  .char-main {
    font-family:'Noto Serif SC',serif;
    font-size:72px;
    font-weight:700;
    line-height:1;
    color:var(--ink);
    position:relative;
    z-index:1;
    animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }

  @keyframes popIn {
    from{opacity:0;transform:scale(0.7)}
    to{opacity:1;transform:scale(1)}
  }

  .pinyin {
    font-size:22px;
    font-weight:400;
    color:var(--orange);
    letter-spacing:0.08em;
    margin-bottom:6px;
    animation:fadeUp 0.4s 0.15s ease both;
  }
  .meaning {
    font-size:15px;
    color:var(--ink-mid);
    font-weight:400;
    margin-bottom:1.25rem;
    animation:fadeUp 0.4s 0.2s ease both;
  }

  @keyframes fadeUp {
    from{opacity:0;transform:translateY(8px)}
    to{opacity:1;transform:translateY(0)}
  }

  /* Tags */
  .tags {
    display:flex;
    justify-content:center;
    gap:7px;
    margin-bottom:1.25rem;
    animation:fadeUp 0.4s 0.25s ease both;
  }
  .tag {
    font-size:11px;font-weight:500;
    border-radius:20px;padding:3px 10px;
  }
  .tag-hsk{background:var(--orange-light);color:var(--orange-dark)}
  .tag-type{background:var(--green-light);color:var(--green-dark)}

  /* Example sentence */
  .example-box {
    background:var(--surface);
    border-radius:12px;
    padding:12px 14px;
    text-align:left;
    margin-bottom:1.25rem;
    animation:fadeUp 0.4s 0.3s ease both;
  }
  .example-label {
    font-size:10px;font-weight:600;letter-spacing:0.08em;
    text-transform:uppercase;color:var(--ink-light);
    margin-bottom:6px;
  }
  .example-zh {
    font-family:'Noto Serif SC',serif;
    font-size:16px;color:var(--ink);
    line-height:1.5;margin-bottom:3px;
  }
  .example-pinyin {
    font-size:12px;color:var(--orange);
    letter-spacing:0.04em;margin-bottom:3px;
  }
  .example-en {
    font-size:12px;color:var(--ink-mid);
    font-style:italic;
  }

  /* Stroke count & progress */
  .meta-row {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    margin-bottom:1.25rem;
    animation:fadeUp 0.4s 0.35s ease both;
  }
  .meta-item {
    display:flex;align-items:center;gap:5px;
    font-size:12px;color:var(--ink-light);
  }
  .meta-dot {
    width:6px;height:6px;border-radius:50%;
    background:var(--border);
  }

  /* Progress ring — days into year */
  .progress-wrap {
    display:flex;align-items:center;justify-content:center;
    gap:10px;
    padding:10px 0 4px;
    border-top:1px solid var(--border);
    animation:fadeUp 0.4s 0.4s ease both;
  }
  .progress-track {
    flex:1;height:4px;
    background:var(--orange-light);
    border-radius:10px;overflow:hidden;
    max-width:160px;
  }
  .progress-fill {
    height:100%;
    background:var(--orange);
    border-radius:10px;
    transition:width 1s ease;
  }
  .progress-label {
    font-size:11px;color:var(--ink-light);white-space:nowrap;
  }

  /* Footer */
  .footer {
    padding:0.75rem 1.25rem;
    border-top:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .share-btn {
    background:none;border:1.5px solid var(--border);
    border-radius:8px;padding:6px 12px;
    font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;
    color:var(--ink-mid);cursor:pointer;
    transition:all 0.12s;
  }
  .share-btn:hover{border-color:var(--orange);color:var(--orange)}
  .next-word {
    font-size:11px;color:var(--ink-light);
  }
</style>
</head>
<body>

<div class="widget">
  <div class="header">
    <div class="wotd-header-label">✦ Word of the Day</div>
    <div class="date-badge" id="dateBadge"></div>
  </div>

  <div class="body">
    <div class="char-wrap">
      <div class="char-bg" id="charBg"></div>
      <div class="char-main" id="charMain"></div>
    </div>

    <div class="pinyin" id="pinyin"></div>
    <div class="meaning" id="meaning"></div>

    <div class="tags">
      <div class="tag tag-hsk" id="tagHsk"></div>
      <div class="tag tag-type" id="tagType"></div>
    </div>

    <div class="example-box">
      <div class="example-label">Example sentence</div>
      <div class="example-zh" id="exZh"></div>
      <div class="example-pinyin" id="exPy"></div>
      <div class="example-en" id="exEn"></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-label" id="progressLabel"></div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-label">Word 365</div>
    </div>
  </div>

  <div class="footer">
    <button class="share-btn" onclick="share()">Share ↗</button>
    <div class="next-word" id="nextWord"></div>
  </div>
</div>

<script>

// ─────────────────────────────────────────────────────────────
//  Pick word based on day of year — same word all day, new word
//  at midnight, deterministic so everyone gets same word
// ─────────────────────────────────────────────────────────────
function getDayOfYear() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const diff = now - start;
  const oneDay = 86400000;
  return Math.floor(diff / oneDay);
}

function getTodayWord() {
  const day = getDayOfYear();
  return WORDS[day % WORDS.length];

}

function formatDate(d) {
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}

function init() {
  const now = new Date();
  const w = getTodayWord();
  const day = getDayOfYear();
  const totalDays = 365;
  const pct = Math.round((day / totalDays) * 100);

  // Date badge
  document.getElementById('dateBadge').textContent = formatDate(now);

  // Character
  document.getElementById('charBg').textContent = w.c;
  document.getElementById('charMain').textContent = w.c;
  document.getElementById('pinyin').textContent = w.py;
  document.getElementById('meaning').textContent = w.m;

  // Tags
  const hskLabel = w.hsk >= 7 ? 'HSK 7–9' : `HSK ${w.hsk}`;
  document.getElementById('tagHsk').textContent = hskLabel;
  document.getElementById('tagType').textContent = w.t;

  // Example
  document.getElementById('exZh').textContent = w.ez;
  document.getElementById('exPy').textContent = w.ep;
  document.getElementById('exEn').textContent = w.ee;

  // Progress — day of year
  document.getElementById('progressLabel').textContent = `Word ${day}`;
  document.getElementById('progressFill').style.width = pct + '%';

  // Next word countdown
  const midnight = new Date(now);
  midnight.setHours(24, 0, 0, 0);
  const hoursLeft = Math.floor((midnight - now) / 3600000);
  const minsLeft  = Math.floor(((midnight - now) % 3600000) / 60000);
  document.getElementById('nextWord').textContent =
    `Next word in ${hoursLeft}h ${minsLeft}m`;
}

function share() {
  const w = getTodayWord();
  const text = `Today's Mandarin Zest word of the day: ${w.c} (${w.py}) — ${w.m} 🇨🇳\n\nExample: ${w.ez}\n${w.ee}\n\nLearn Chinese at MandarinZest.com`;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.share-btn');
      btn.textContent = 'Copied! ✓';
      setTimeout(() => btn.textContent = 'Share ↗', 2000);
    });
  }
}

init();
</script>
